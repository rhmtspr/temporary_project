name: food_classifier
description: Food identification app using ML and AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & Navigation
  provider: ^6.1.1
  go_router: ^14.2.7

  # Image
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  camera: ^0.11.0+2

  # ML / TFLite
  tflite_flutter: ^0.10.4

  # Firebase
  firebase_core: ^3.6.0
  firebase_ml_model_downloader: ^0.2.3+7

  # Network
  http: ^1.2.2
  google_generative_ai: ^0.4.6

  # Permissions
  permission_handler: ^11.3.1

  # Utils
  path_provider: ^2.1.4
  path: ^1.9.0
  image: ^4.2.0
  logger: ^2.4.0
  cached_network_image: ^3.4.1
  flutter_spinkit: ^5.2.1
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/images/
